manifest_path: data/processed/self_001/manifest.jsonl
experiment_dir: experiments/exp_004_audio_to_motion_gru
seed: 7
dataset:
  train_splits:
    - train
  val_splits:
    - val
  motion_feature_name: motion_vector
model:
  name: gru
  hidden_size: 256
  num_layers: 2
  dropout: 0.1
  bidirectional: false
training:
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.0
  epochs: 50
  device: auto
  precision: fp32
  grad_clip_norm: 1.0
  velocity_loss_weight: 0.1
  num_workers: 0
  resume_from: null
