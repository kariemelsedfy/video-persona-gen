# Prediction config for the wav2vec model with "alive" post-processing.
# Used as --model-config-path for the render roundtrip. Only audio_feature_names
# and motion_postprocess are read at prediction time (the model itself is rebuilt
# from the checkpoint). Blinks are injected into the eyelid expression keypoints
# using the clip's own real blink pose, so render NORMALLY (no eye-retargeting
# flag, which would suppress the base mouth/head motion).
dataset:
  audio_feature_names:
    - wav2vec
  motion_feature_name: motion_vector
motion_postprocess:
  # Amplify mouth/expression motion around its temporal mean (MSE damps it).
  expression_scale: 3.0
  rotation_scale: 1.0
  translation_scale: 1.0
  # Inject procedural head sway (head pose is not audio-predictable, so the model
  # outputs a near-still head; this makes the avatar read as alive not frozen).
  add_idle_motion: true
  idle_yaw_deg: 4.0
  idle_pitch_deg: 3.0
  idle_roll_deg: 2.0
  idle_seed: 0
  # Inject natural blinks into the eyelid expression keypoints (normal path).
  add_blinks: true
  blink_interval_sec: 3.5
  blink_jitter_sec: 1.5
  blink_ms: 180.0
  blink_closed_value: 0.02
  blink_seed: 0
