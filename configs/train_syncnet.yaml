# Audio<->motion SyncNet: contrastive discriminator that scores lip-sync.
# Short windows (~1s) with in-batch negatives. Provides an objective sync metric
# and can guide flow sampling toward better synchrony.
manifest_path: data/processed/huberman/manifest.jsonl
experiment_dir: experiments/exp_syncnet
seed: 7
dataset:
  audio_feature_names:
    - wav2vec
  motion_feature_name: motion_vector
  windowing:
    enabled: true
    window_size: 20      # ~1.0s at 20fps
    stride: 8
    train_fraction: 0.8
    val_fraction: 0.1
    boundary_gap: 0
model:
  hidden_size: 256
  embed_dim: 256
  num_layers: 2
  dropout: 0.1
training:
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.0001
  epochs: 120
  device: auto
